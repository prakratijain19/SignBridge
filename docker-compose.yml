# Local development stack for SignBridge.
#
#   docker compose up -d db          # just PostgreSQL (run apps with pnpm dev)
#   docker compose up --build        # full stack in containers
#
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: signbridge
      POSTGRES_PASSWORD: signbridge
      POSTGRES_DB: signbridge
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U signbridge -d signbridge']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://signbridge:signbridge@db:5432/signbridge?schema=public
    ports:
      - '4000:4000'
    profiles: ['full']

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '3000:3000'
    profiles: ['full']

  ml:
    build:
      context: ./services/ml
    restart: unless-stopped
    ports:
      - '8000:8000'
    profiles: ['full']

volumes:
  pgdata:
