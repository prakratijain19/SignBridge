name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  node:
    name: Lint, typecheck, build & test (Node)
    runs-on: ubuntu-latest
    env:
      # Prisma generate reads the datasource url from the schema; a syntactically
      # valid placeholder is enough since CI does not connect to a database here.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  ml:
    name: Test (Python ML service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest
